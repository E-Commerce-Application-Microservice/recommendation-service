apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: clahanstore
spec:
  clusterIP: None
  selector:
    app: mongodb
  ports:
  - port: 27017
    targetPort: 27017

---

apiVersion: v1
kind: Service
metadata:
  name: frontend-ui
  namespace: clahanstore
spec:
  selector:
    app: frontend-ui
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP

---

apiVersion: v1
kind: Service
metadata:
  name: recommendation-service
  namespace: clahanstore
spec:
  clusterIP: None
  selector:
    app: recommendation-service
  ports:
  - port: 3013
    targetPort: 3013

---

apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: clahanstore
spec:
  selector:
    app: api-gateway
  ports:
  - name: http
    port: 3000
    targetPort: 3012
  type: ClusterIP